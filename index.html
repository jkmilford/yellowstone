<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yellowstone Wildlife — Field Match</title>
<meta name="description" content="Play a fun free Yellowstone Wildlife memory matching game. Match animals and learn interesting field facts!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --obsidian:#0E1A18;
    --obsidian-2:#13241F;
    --panel:#16302A;
    --panel-2:#1B3A32;
    --spring-blue:#1C7FA0;
    --spring-teal:#34B0A0;
    --mat-green:#7DB23E;
    --mat-gold:#E9B53D;
    --mat-orange:#DD7A2E;
    --mat-rust:#B0431F;
    --steam:#F2ECDD;
    --steam-dim:#AEB8AE;
    --line:#2C5044;
    --card-cream:#f5edd9;
    --card-cream2:#e4d6b4;
    --ink:#2a2114;
    --ink-soft:#5a4a31;
    --r:14px;
    --shadow:0 18px 40px -18px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background: radial-gradient(1200px 700px at 70% -10%, rgba(52,176,160,.10), transparent 60%), radial-gradient(900px 600px at 10% 110%, rgba(221,122,46,.08), transparent 55%), var(--obsidian);
    color:var(--steam);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:780px;margin:0 auto;padding:22px 18px 64px}

  .back-link {
    color: var(--steam-dim);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: .06em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 12px 0 8px;
  }
  .back-link:hover { color: var(--steam); }

  header.hud{display:flex;align-items:center;gap:14px;padding:14px 18px;background:linear-gradient(180deg,var(--panel),var(--obsidian-2));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
  .badge{flex:none;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 50% 50%,var(--spring-blue) 0 22%,var(--spring-teal) 22% 40%,var(--mat-green) 40% 58%,var(--mat-gold) 58% 74%,var(--mat-orange) 74% 88%,var(--mat-rust) 88% 100%);box-shadow:inset 0 0 0 2px rgba(255,255,255,.15), 0 4px 12px -4px rgba(0,0,0,.6);}
  .titles h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.34rem;line-height:1.05;margin:0;letter-spacing:.2px;}
  .titles p{margin:3px 0 0;font-family:'Space Mono',monospace;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--steam-dim);}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0 12px;}
  .seg{display:inline-flex;gap:4px;padding:4px;border-radius:11px;background:var(--obsidian-2);border:1px solid var(--line);}
  .seg button{appearance:none;border:0;cursor:pointer;color:var(--steam-dim);font-family:'Space Mono',monospace;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:7px 13px;border-radius:8px;background:transparent;transition:background .15s,color .15s;}
  .seg button[aria-pressed="true"]{background:linear-gradient(180deg,#27513C,var(--panel));color:var(--steam);box-shadow:inset 0 0 0 1px rgba(233,181,61,.4);}
  .spacer{flex:1 1 auto}
  .ghost{appearance:none;cursor:pointer;color:var(--steam);font-family:'Space Mono',monospace;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:9px 15px;border-radius:10px;background:var(--panel);border:1px solid var(--line);transition:border-color .15s;}
  .ghost:hover{border-color:var(--mat-gold)}

  .stats{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px;}
  .stat{flex:1 1 0;min-width:96px;background:var(--obsidian-2);border:1px solid var(--line);border-radius:12px;padding:10px 13px;}
  .stat .k{font-family:'Space Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--steam-dim);}
  .stat .v{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.4rem;line-height:1.1;margin-top:2px;}

  .board{display:grid;gap:11px;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));}
  @media(max-width:430px){.board{grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:8px}}
  .card{appearance:none;border:0;background:transparent;padding:0;cursor:pointer;aspect-ratio:3/4;perspective:800px;border-radius:11px;}
  .card:focus-visible{outline:2px solid var(--mat-gold);outline-offset:3px;border-radius:12px}
  .card .inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.2,.7,.2,1);border-radius:11px;}
  .card.flipped .inner,.card.matched .inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:11px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .back{background:linear-gradient(160deg,var(--spring-blue),var(--spring-teal));box-shadow:inset 0 0 0 2px rgba(14,26,24,.35), inset 0 0 26px rgba(0,0,0,.28);}
  .back .paw{width:54%;height:54%;color:var(--mat-gold);filter:drop-shadow(0 2px 4px rgba(0,0,0,.22));}
  .front{transform:rotateY(180deg);background:linear-gradient(160deg,var(--card-cream),var(--card-cream2));box-shadow:inset 0 0 0 2px rgba(176,67,31,.25), inset 0 0 0 5px rgba(245,237,217,.6);flex-direction:column;gap:5px;padding:8px 6px;}
  .front .spec{height:48%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;line-height:1;color:var(--ink);}
  .front .spec svg{height:1.4em;width:auto;display:block}
  .front .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.74rem;line-height:1.05;text-align:center;color:var(--ink);padding:0 2px;}
  @media(max-width:430px){.front .spec{font-size:2rem}.front .nm{font-size:.64rem}}
  .card.matched{cursor:default}
  .card.matched .front{box-shadow:inset 0 0 0 2px var(--mat-gold), inset 0 0 0 5px rgba(245,237,217,.6);animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.05)}100%{transform:scale(1)}}

  .fx-layer{position:fixed;inset:0;pointer-events:none;z-index:35;overflow:hidden}
  .spark{position:fixed;width:10px;height:10px;border-radius:2px;transform:translate(-50%,-50%);box-shadow:0 1px 3px rgba(0,0,0,.25);animation:burst var(--dur,3000ms) linear forwards;}
  @keyframes burst{0%{transform:translate(-50%,-50%) translate(0,0) rotate(0) scale(.35);opacity:0}6%{opacity:1}24%{transform:translate(-50%,-50%) translate(var(--x),var(--y1)) rotate(calc(var(--rot)*.35)) scale(1);opacity:1}82%{opacity:1}100%{transform:translate(-50%,-50%) translate(var(--x2),var(--y2)) rotate(var(--rot)) scale(.85);opacity:0}}
  .fx-ring{position:fixed;width:22px;height:22px;border-radius:50%;border:3px solid var(--mat-gold);transform:translate(-50%,-50%);animation:ring 1700ms ease-out forwards;}
  @keyframes ring{0%{opacity:.9;transform:translate(-50%,-50%) scale(.3)}55%{opacity:.5}100%{opacity:0;transform:translate(-50%,-50%) scale(3.6)}}

  .fieldnote{margin-top:20px;border-radius:16px;background:linear-gradient(165deg,var(--card-cream),var(--card-cream2));border:1px solid rgba(176,67,31,.3);box-shadow:var(--shadow), inset 0 0 0 4px rgba(245,237,217,.55);padding:22px 24px;color:var(--ink);opacity:0;transform:translateY(8px);transition:opacity .35s,transform .35s;min-height:118px;}
  .fieldnote.show{opacity:1;transform:none}
  .fieldnote .eyebrow{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mat-rust);margin-bottom:4px;}
  .fieldnote .who{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .fieldnote .who .ic{font-size:2rem;line-height:1}
  .fieldnote .who h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.5rem;line-height:1.05;margin:0;color:var(--ink);}
  .fieldnote .fact{font-size:1.2rem;line-height:1.62;color:var(--ink);max-width:60ch;}
  .fieldnote .empty{font-size:1.05rem;line-height:1.6;color:var(--ink-soft);font-style:italic;}
  @media(max-width:430px){.fieldnote{padding:18px 18px}.fieldnote .who h2{font-size:1.3rem}.fieldnote .fact{font-size:1.12rem;line-height:1.58}}

  .overlay{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:center;padding:28px 16px;overflow:auto;z-index:40;background:rgba(8,16,14,.72);backdrop-filter:blur(3px);}
  .overlay.show{display:flex}
  .sheet{width:100%;max-width:680px;margin:auto 0;background:linear-gradient(180deg,var(--panel),var(--obsidian-2));border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:26px 26px 28px;}
  .crest{width:74px;height:74px;border-radius:50%;margin:0 auto 12px;background:radial-gradient(circle at 50% 50%,var(--spring-blue) 0 20%,var(--spring-teal) 20% 38%,var(--mat-green) 38% 56%,var(--mat-gold) 56% 74%,var(--mat-orange) 74% 88%,var(--mat-rust) 88% 100%);}
  .sheet h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;text-align:center;font-size:1.8rem;margin:0;line-height:1.05;}
  .rank{text-align:center;font-family:'Space Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--mat-gold);font-size:.84rem;margin:6px 0 2px;}
  .runline{text-align:center;color:var(--steam-dim);font-size:.92rem;margin:0 0 18px;}
  .guide-title{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--steam-dim);margin:0 0 10px;}
  .guide{display:flex;flex-direction:column;gap:10px}
  .entry{display:flex;gap:14px;align-items:flex-start;background:linear-gradient(160deg,var(--card-cream),var(--card-cream2));border-radius:13px;padding:14px 16px;color:var(--ink);box-shadow:inset 0 0 0 3px rgba(245,237,217,.5);}
  .entry .ic{flex:none;font-size:1.9rem;line-height:1;width:40px;text-align:center}
  .entry .tx h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.12rem;line-height:1.1;margin:0 0 3px;color:var(--ink);}
  .entry .tx p{margin:0;font-size:1.04rem;line-height:1.55;color:var(--ink);}
  @media(max-width:430px){.entry .tx p{font-size:1rem}}
  .winfoot{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap}
  .primary{appearance:none;border:0;cursor:pointer;font-family:'Space Mono',monospace;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;padding:12px 22px;border-radius:11px;color:var(--obsidian);background:linear-gradient(180deg,var(--mat-gold),var(--mat-orange));box-shadow:0 8px 20px -8px rgba(221,122,46,.7);}
</style>
</head>
<body>
<div class="wrap">
  <a href="https://parkadventureseries.com/" class="back-link">← Back to Park Adventure Series</a>

  <header class="hud">
    <div class="badge" aria-hidden="true"></div>
    <div class="titles">
      <h1>Yellowstone Wildlife — Field Match</h1>
      <p>Flip the rings · match the pair · log the fact</p>
    </div>
  </header>

  <div class="toolbar">
    <div class="seg" role="group" aria-label="Difficulty">
      <button type="button" data-diff="easy" aria-pressed="true">Easy</button>
      <button type="button" data-diff="medium" aria-pressed="false">Medium</button>
      <button type="button" data-diff="hard" aria-pressed="false">Hard</button>
    </div>
    <span class="spacer"></span>
    <button type="button" class="ghost" id="newRound">New round</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="k">Moves</div><div class="v" id="sMoves">0</div></div>
    <div class="stat"><div class="k">Time</div><div class="v" id="sTime">0:00</div></div>
    <div class="stat"><div class="k">Pairs</div><div class="v" id="sPairs">0/8</div></div>
    <div class="stat"><div class="k">Best moves</div><div class="v" id="sBest">—</div></div>
  </div>

  <div class="board" id="board" aria-label="Matching board"></div>

  <div class="fieldnote" id="note" aria-live="polite">
    <div class="empty" id="noteEmpty">Match a pair to add a Yellowstone field note here.</div>
    <div id="noteBody" hidden>
      <div class="eyebrow">Field note</div>
      <div class="who"><span class="ic" id="noteIc"></span><h2 id="noteName"></h2></div>
      <div class="fact" id="noteFact"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
  <div class="sheet">
    <div class="crest" aria-hidden="true"></div>
    <h2 id="winTitle">Expedition complete</h2>
    <div class="rank" id="winRank">Field Ranger</div>
    <p class="runline" id="winRun"></p>
    <p class="guide-title">Field guide — what you logged</p>
    <div class="guide" id="guide"></div>
    <div class="winfoot">
      <button type="button" class="primary" id="again">Play again</button>
    </div>
  </div>
</div>

<script>
const $ = (s,r=document)=>r.querySelector(s);

const SVG = {
  // IMPROVED BISON
  bison: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="American Bison">
    <path d="M25 55 Q25 78 48 82 Q75 78 75 55 Q78 42 68 38 Q55 35 45 35 Q35 35 22 38 Q18 45 25 55" fill="#3C2A1F"/>
    <path d="M30 38 Q42 28 58 28 Q68 35 68 42" fill="#2C2118"/>
    <ellipse cx="32" cy="48" rx="13" ry="14" fill="#3C2A1F"/>
    <path d="M22 38 Q18 30 24 28" fill="none" stroke="#2C2118" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M42 38 Q46 30 40 28" fill="none" stroke="#2C2118" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="23" cy="42" rx="3.5" ry="4.5" fill="#2C2118"/>
    <ellipse cx="41" cy="42" rx="3.5" ry="4.5" fill="#2C2118"/>
    <circle cx="27" cy="46" r="2.2" fill="#1a120a"/>
    <circle cx="37" cy="46" r="2.2" fill="#1a120a"/>
    <path d="M25 55 Q32 68 40 55" fill="#2C2118"/>
    <rect x="32" y="75" width="7" height="18" rx="2" fill="#2C2118"/>
    <rect x="55" y="75" width="7" height="18" rx="2" fill="#2C2118"/>
  </svg>`,

  // IMPROVED BEAVER
  beaver: `<svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="American Beaver">
    <!-- Body -->
    <ellipse cx="50" cy="52" rx="32" ry="26" fill="#8a5e36"/>
    <!-- Head -->
    <ellipse cx="50" cy="35" rx="18" ry="16" fill="#8a5e36"/>
    <!-- Ears -->
    <ellipse cx="38" cy="24" rx="5" ry="6" fill="#5a3d24"/>
    <ellipse cx="62" cy="24" rx="5" ry="6" fill="#5a3d24"/>
    <!-- Eyes -->
    <circle cx="42" cy="33" r="2.8" fill="#231708"/>
    <circle cx="58" cy="33" r="2.8" fill="#231708"/>
    <!-- Nose -->
    <ellipse cx="50" cy="40" rx="3.5" ry="2.5" fill="#231708"/>
    <!-- Teeth -->
    <rect x="46" y="42" width="3" height="6" fill="#f5edd9"/>
    <rect x="51" y="42" width="3" height="6" fill="#f5edd9"/>
    <!-- Tail -->
    <path d="M82 55 Q95 60 82 72" fill="none" stroke="#5a3d24" stroke-width="12" stroke-linecap="round"/>
    <!-- Legs -->
    <ellipse cx="32" cy="72" rx="7" ry="5" fill="#5a3d24"/>
    <ellipse cx="68" cy="72" rx="7" ry="5" fill="#5a3d24"/>
  </svg>`,

  // IMPROVED OTTER
  otter: `<svg viewBox="0 0 100 85" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="River Otter">
    <!-- Body -->
    <ellipse cx="50" cy="48" rx="28" ry="18" fill="#5c4033"/>
    <!-- Head -->
    <ellipse cx="72" cy="42" rx="13" ry="12" fill="#5c4033"/>
    <!-- Ears -->
    <ellipse cx="64" cy="33" rx="3.5" ry="4" fill="#3f2a22"/>
    <ellipse cx="80" cy="33" rx="3.5" ry="4" fill="#3f2a22"/>
    <!-- Eyes -->
    <circle cx="67" cy="40" r="2.2" fill="#1c1308"/>
    <circle cx="77" cy="40" r="2.2" fill="#1c1308"/>
    <!-- Nose -->
    <ellipse cx="82" cy="45" rx="3" ry="2" fill="#1c1308"/>
    <!-- Tail -->
    <path d="M22 48 Q12 55 18 68" fill="none" stroke="#5c4033" stroke-width="14" stroke-linecap="round"/>
    <!-- Legs -->
    <ellipse cx="38" cy="62" rx="5" ry="7" fill="#5c4033"/>
    <ellipse cx="58" cy="62" rx="5" ry="7" fill="#5c4033"/>
  </svg>`
};

const PAW = `<svg class="paw" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" fill="currentColor">
  <path d="M32 32.5 C25.5 32.5 18.6 36.6 17.6 44 C16.8 50.2 19.9 55.4 25.2 56 C28.2 56.3 30 53 32 53 C34 53 35.8 56.3 38.8 56 C44.1 55.4 47.2 50.2 46.4 44 C45.4 36.6 38.5 32.5 32 32.5 Z"/>
  <ellipse cx="23" cy="18.5" rx="5" ry="7.1" transform="rotate(-13 23 18.5)"/>
  <ellipse cx="41" cy="18.5" rx="5" ry="7.1" transform="rotate(13 41 18.5)"/>
  <ellipse cx="11.5" cy="30" rx="4.6" ry="6.6" transform="rotate(-31 11.5 30)"/>
  <ellipse cx="52.5" cy="30" rx="4.6" ry="6.6" transform="rotate(31 52.5 30)"/>
</svg>`;

const ANIMALS = [
  {key:"bison", name:"Bison", svg:"bison", fact:"North America's largest land animal — up to 2,000 lb, yet it can sprint at 35 mph."},
  {key:"wolf", name:"Gray Wolf", emoji:"🐺", fact:"Returned to the park in 1995. As packs thinned the elk herds, willows recovered and rivers steadied."},
  {key:"bear", name:"Grizzly Bear", emoji:"🐻", fact:"It can smell food from over a mile away and pack on three pounds a day before denning for winter."},
  {key:"elk", name:"Elk", emoji:"🦌", fact:"The park's most abundant large mammal. In autumn, bull elk bugle to challenge rivals and gather harems."},
  {key:"eagle", name:"Bald Eagle", emoji:"🦅", fact:"It builds some of the largest tree nests of any North American bird, adding to the same nest for years."},
  {key:"otter", name:"River Otter", svg:"otter", fact:"Fast and playful in water, it seals its nostrils and ears to dive and hunt beneath winter ice."},
  {key:"beaver", name:"American Beaver", svg:"beaver", fact:"A natural engineer — its dams flood meadows into wetlands that dozens of other species depend on."},
  {key:"fox", name:"Red Fox", emoji:"🦊", fact:"It hunts by sound, leaping high to punch through deep snow onto voles it cannot even see."},
  {key:"sheep", name:"Bighorn Sheep", emoji:"🐏", fact:"Rams collide at 20 mph; a double layer of bone across the skull absorbs the shock of the clash."},
  {key:"swan", name:"Trumpeter Swan", emoji:"🦢", fact:"North America's heaviest native waterfowl, spanning over seven feet from wingtip to wingtip."},
  {key:"trout", name:"Cutthroat Trout", emoji:"🐟", fact:"Named for the red slash beneath its jaw, it is a keystone meal for bears, otters, and eagles alike."},
  {key:"hare", name:"Snowshoe Hare", emoji:"🐇", fact:"It molts from brown to white each winter and grows wide, furred feet that work like snowshoes."},
  {key:"owl", name:"Great Gray Owl", emoji:"🦉", fact:"It can hear a vole moving under a foot of snow, then plunge through the crust to seize it."},
  {key:"badger", name:"American Badger", emoji:"🦡", fact:"A powerful digger that sometimes teams up with a coyote to corner ground squirrels underground."},
  {key:"chip", name:"Uinta Chipmunk", emoji:"🐿️", fact:"It packs seeds into cheek pouches that can stretch nearly to the width of its own body."},
  {key:"snake", name:"Garter Snake", emoji:"🐍", fact:"The park's most common reptile, often seen swimming after fish and frogs along stream edges."}
];

const DIFF = { easy:8, medium:12, hard:16 };

let state = {diff:"easy",deck:[],first:null,lock:false,moves:0,matched:0,total:0,startedAt:0,tick:null,best:{easy:null,medium:null,hard:null}};

function iconHTML(a){ return a.svg ? SVG[a.svg] : `<span>${a.emoji}</span>`; }
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function fmtTime(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function startClock(){ stopClock(); state.startedAt=Date.now(); state.tick=setInterval(()=>{ $("#sTime").textContent=fmtTime(Date.now()-state.startedAt); },250); }
function stopClock(){ if(state.tick){clearInterval(state.tick);state.tick=null;} }

function setBestDisplay(){ const b=state.best[state.diff]; $("#sBest").textContent = b==null ? "—" : b; }

function newRound(){
  stopClock(); state.first=null; state.lock=false; state.moves=0; state.matched=0;
  const pairs=DIFF[state.diff]; state.total=pairs;
  const pick=shuffle(ANIMALS.slice()).slice(0,pairs);
  const cards=[]; pick.forEach(a=>{ cards.push({a}); cards.push({a}); });
  state.deck=shuffle(cards);

  $("#sMoves").textContent="0"; $("#sTime").textContent="0:00"; $("#sPairs").textContent=`0/${pairs}`; setBestDisplay();

  $("#noteBody").hidden=true; $("#noteEmpty").hidden=false;
  const note = $("#note"); note.classList.remove("show"); void note.offsetWidth; note.classList.add("show");

  const board=$("#board"); board.innerHTML="";
  state.deck.forEach((c,i)=>{
    const btn=document.createElement("button");
    btn.type="button"; btn.className="card"; btn.setAttribute("aria-label","Card, face down");
    btn.innerHTML=`<div class="inner"><div class="face back">${PAW}</div><div class="face front"><div class="spec">${iconHTML(c.a)}</div><div class="nm">${c.a.name}</div></div></div>`;
    btn.addEventListener("click",()=>onPick(i,btn));
    c.el=btn; c.flipped=false; c.matched=false;
    board.appendChild(btn);
  });
}

function onPick(i,btn){
  const c=state.deck[i];
  if(state.lock||c.flipped||c.matched) return;
  if(state.matched===0 && !state.first && !state.tick) startClock();
  flip(c,true);
  if(!state.first){ state.first=c; return; }
  state.moves++; $("#sMoves").textContent=state.moves;
  const a=state.first; state.first=null;
  if(a.a.key===c.a.key){
    a.matched=c.matched=true;
    a.el.classList.add("matched"); c.el.classList.add("matched");
    state.matched++; $("#sPairs").textContent=`${state.matched}/${state.total}`;
    burstBetween(a.el,c.el); showNote(c.a);
    if(state.matched===state.total) finish();
  } else {
    state.lock=true;
    setTimeout(()=>{ flip(a,false); flip(c,false); state.lock=false; },820);
  }
}

function flip(c,on){ c.flipped=on; c.el.classList.toggle("flipped",on); }

function showNote(a){
  $("#noteEmpty").hidden=true; $("#noteBody").hidden=false;
  $("#noteIc").innerHTML=iconHTML(a); $("#noteName").textContent=a.name; $("#noteFact").textContent=a.fact;
  const n=$("#note"); n.classList.remove("show"); void n.offsetWidth; n.classList.add("show");
}

const REDUCED = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function burstBetween(el1,el2){ if(REDUCED) return; /* burst animation code */ }

function finish(){ /* win screen code */ }

document.querySelectorAll('.seg button').forEach(b=>{ b.addEventListener("click",()=>{ document.querySelectorAll('.seg button').forEach(x=>x.setAttribute("aria-pressed","false")); b.setAttribute("aria-pressed","true"); state.diff=b.dataset.diff; newRound(); }); });

$("#newRound").addEventListener("click",newRound);
$("#again").addEventListener("click",()=>{ $("#overlay").classList.remove("show"); newRound(); });

newRound();
</script>
</body>
</html>
